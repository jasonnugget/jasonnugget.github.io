<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>j4son.dev</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="route-home">
    <video id="bgVideo" autoplay muted loop playsinline></video>

    <div class="header">
        <div class="websiteHome">
            <div><a href="/" data-route="home">j4son.dev</a></div>
        </div>
        <div class="rightSide">
            <div><a href="/projects" data-route="projects">Projects</a></div>
            <div><a href="/about" data-route="about">About Me</a></div>
            <div><a href="/experience" data-route="experience">Experience</a></div>
        </div>
    </div>

    <main id="view"></main>

    <template id="tpl-home">
        <div class="homepage">
            <div class="hero">
                <h1>hello, my name is jason!</h1>
                <p>an aspiring software engineer @ UCF.</p>
                <div class="icons">
                    <a href="https://github.com/jasonnugget" target="_blank"><i class="fa-brands fa-github"></i></a>
                    <a href="https://x.com/jasonexpl0res" target="_blank"><i class="fa-brands fa-x-twitter"></i></a>
                    <a href="https://www.linkedin.com/in/j-nguyen05/" target="_blank"><i class="fa-brands fa-linkedin"></i></a>
                </div>
            </div>
        </div>
    </template>

    <template id="tpl-projects">
        <h1 class="projectsPage">My Projects:</h1>
        <div class="grid">
            <div class="projectBox">
                <a href="https://github.com/jasonnugget/Sense" target="_blank">
                    <img src="/images/projects/sense.png" alt="sense project">
                </a>
                <h3>Project Sense</h3>
                <p>
                    A real time weapon detection system built to upgrade systems of cameras. Utilizing
                    YOLO v11 model, we finetuned to increase accuracy of detections for real and false weapons.
                    I designed the backend utilizing FastAPI, OpenCV, and PostgreSQL.
                </p>
            </div>
            <div class="projectBox">
                
                <img src="/images/projects/portfoliosite.png" alt="portfolio">
                <h3>Portfolio Website</h3>
                <p>
                    I built the website using only HTML, CSS, and JavaScript. It was built 
                    with my own SPA router to support the usage of the video in the background. 
                    I deployed on GitHub Pages with my own domain.
                </p>
            </div>
            <div class="projectBox"><h3>more coming soon!</h3></div>
        </div>
    </template>

    <template id="tpl-about">
        <div class="aboutSection">
            <div class="reading">
                <h1>About Me:</h1>
                <p>
                    Hi! My name is Jason! I am currently a sophomore at University of Central
                    Florida majoring in computer science. I am passionate about problem solving,
                    building, and personal growth! I tend to hyperfixate on tasks that challenge
                    me in a unique way that ultimately benefits my learning. Some hobbies I love are 
                    chess, gaming, and traveling!
                </p>
                <p>
                    What do I plan to use this portfolio for? I want to display what I build, think, and create
                    Through this display, I hope to meet like-minded people along the way! Beyond my skills, this site reflects
                    what I'm passionate about and my prgoress!
                </p>
                <p class="quote">
                    from building and creating my visions, i hope to create an impact in the environment around me
                </p>
            </div>
            <img src="/images/personal.jpg">
        </div>
    </template>

    <template id="tpl-experience">
        <h1 class="experience">I HAVE NONE (YET)</h1>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
    <script src="router.js"></script>
</body>
</html>
